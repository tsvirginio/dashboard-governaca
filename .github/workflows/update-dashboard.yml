name: Atualizar Dashboard de Governança

# Quando este workflow roda:
on:
  # 1. Automático: todo dia às 06:00 UTC (~03h00 horário de Brasília)
  schedule:
    - cron: "0 6 * * *"

  # 2. Manual: botão "Run workflow" na aba Actions do GitHub
  #    Use este para o SEU TESTE — não precisa esperar o cron
  workflow_dispatch:

  # 3. Automático: sempre que houver push nesta branch
  #    (opcional — remova se não quiser isso)
  push:
    branches: [main]
    paths:
      - "update_dashboard.py"

permissions:
  contents: write   # necessário para o Actions conseguir commitar o index.html

jobs:
  atualizar-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Buscar dados do Databricks e gerar HTML
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
        run: python update_dashboard.py

      - name: Commitar e enviar alterações (se houver)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "Nenhuma alteração nos dados" || (
            git commit -m "🤖 Atualização automática do dashboard - $(date '+%d/%m/%Y %H:%M')"
            git push
          )
